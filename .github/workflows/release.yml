name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build mjml-lsp
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --manifest-path crates/mjml-lsp/Cargo.toml --target "$BUILD_TARGET"

      - name: Package binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          cd "crates/mjml-lsp/target/${BUILD_TARGET}/release"
          gzip -c mjml-lsp > "mjml-lsp-${BUILD_TARGET}.gz"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: crates/mjml-lsp/target/${{ matrix.target }}/release/mjml-lsp-${{ matrix.target }}.gz
