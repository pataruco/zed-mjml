name: Deploy
run-name: ${{ github.actor }} is deploying to Google Cloud Run with tag ${{ github.event.inputs.tag }}
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Select the server tag to deploy"
        required: true
        type: string
        default: "zed-mjml-v0.1.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/prepare
        with:
          targets: ${{ matrix.target }}

      - name: 🔨 Build mjml-lsp
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --manifest-path crates/mjml-lsp/Cargo.toml --target "$BUILD_TARGET"

      - name: 📦 Package binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          cd "crates/mjml-lsp/target/${BUILD_TARGET}/release"
          gzip -c mjml-lsp > "mjml-lsp-${BUILD_TARGET}.gz"

      - name: 🚀 Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_TARGET: ${{ matrix.target }}
        run: gh release upload "${{ inputs.tag }}" "crates/mjml-lsp/target/${BUILD_TARGET}/release/mjml-lsp-${BUILD_TARGET}.gz"
